name: "Gitppou"
description: "Generate engineer daily reports from GitHub and Backlog activities, then notify Slack and optionally commit the report."
author: "your-org"

branding:
  icon: "file-text"
  color: "blue"

inputs:
  config:
    description: "Path to gitppou YAML or JSON config file"
    required: false
    default: "gitppou.yml"

outputs:
  report-path:
    description: "Primary generated report file path"
  report-paths:
    description: "Generated report file paths, one per line"
  report-html-path:
    description: "Generated HTML report file path when HTML output is enabled"
  report-markdown:
    description: "Generated report markdown"

runs:
  using: "node24"
  main: "packages/action/dist/index.js"
