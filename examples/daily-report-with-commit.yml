name: Gitppou Daily Report

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: read
  pull-requests: read
  models: read

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Set git.commitReport: true in gitppou.yml.
      - uses: your-org/gitppou@v1
        with:
          config: gitppou.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITPPOU_TOKEN_OWNER: ${{ secrets.GITPPOU_TOKEN_OWNER }}
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
