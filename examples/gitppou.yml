github:
  username: your-name
  tokenEnv: GITHUB_TOKEN
  # Use owner-specific token env vars when repos span private user/org owners.
  # tokens:
  #   your-name: GITPPOU_TOKEN_PERSONAL
  #   your-org: GITPPOU_TOKEN_YOUR_ORG
  repos:
    - owner/repo
    # Fetch the top 20 recently pushed repositories for an owner.
    # - your-org:
    #     limit: 20
    #     sort: pushed

backlog:
  # Set enabled: false to generate reports from GitHub only.
  # enabled: false
  # Optional numeric Backlog user id. Omit to use the API key owner.
  # userId: "123456"
  spaces:
    your-space:
      # Set host when your Backlog URL is not https://your-space.backlog.com.
      # host: your-space.backlog.jp
      projectKeys:
        - APP
    # other-space:
    #   projectKeys:
    #     - OPS

report:
  language: en
  timezone: Asia/Tokyo
  dir: reports
  formats:
    - markdown
    # - html
  # htmlDir: .gitppou/site

llm:
  provider: template
  model: openai/gpt-4o-mini
  maxInputChars: 20000
  style: concise

slack:
  notify: false

git:
  commitReport: false
