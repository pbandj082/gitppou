github:
  username: your-name
  tokenEnv: GITHUB_TOKEN
  # Use owner-specific token env vars when repos span private user/org owners.
  # tokens:
  #   your-name: GITPPOU_TOKEN_PERSONAL
  #   your-org: GITPPOU_TOKEN_YOUR_ORG
  repos:
    - owner/repo
    # Fetch the top 20 recently pushed repositories for an owner.
    # - your-org:
    #     limit: 20
    #     sort: pushed

backlog:
  # Set enabled: false to generate reports from GitHub only.
  # enabled: false
  # Optional numeric Backlog user id. Omit to use the API key owner.
  # userId: "123456"
  spaces:
    your-space:
      # Set host when your Backlog URL is not https://your-space.backlog.com.
      # host: your-space.backlog.jp
      projectKeys:
        - APP
    # other-space:
    #   projectKeys:
    #     - OPS
  # Optional: publish the generated Markdown report as a Backlog document.
  # document:
  #   enabled: true
  #   # Required when multiple spaces are configured.
  #   space: your-space
  #   # Use projectKey or projectId. projectKey is resolved through /projects.
  #   projectKey: APP
  #   # Backlog document parent ID. Omit to create at the project document root.
  #   parentId: "parent-document-id"
  #   title: "Daily Report {{date}}"
  #   addLast: true

report:
  # Optional display name in the generated report metadata.
  # Defaults to github.username.
  # author: Your Name
  language: en
  timezone: Asia/Tokyo
  dir: reports
  formats:
    - markdown
    # - html
    # - pdf
  # htmlDir: .gitppou/site
  # pdfDir: .gitppou/pdf

llm:
  provider: template
  # OpenAI:
  # provider: openai
  # model: gpt-5-nano
  # apiKeyEnv: OPENAI_API_KEY
  # AWS Bedrock:
  # provider: aws-bedrock
  # model: jp.amazon.nova-2-lite-v1:0
  # region: ap-northeast-1
  # profile: your-local-profile
  maxInputChars: 20000
  style: concise

slack:
  notify: false

git:
  commitReport: false
